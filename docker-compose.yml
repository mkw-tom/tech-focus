services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    command: pnpm --filter @tech-focus/web dev
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    command: pnpm --filter @tech-focus/api dev
    ports:
      - "8787:8787"
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - pnpm_store:/root/.local/share/pnpm/store

volumes:
  root_node_modules:
  web_node_modules:
  api_node_modules:
  pnpm_store:
